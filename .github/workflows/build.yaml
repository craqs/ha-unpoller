name: Build add-on

on:
  push:
    branches: [main]
    paths:
      - "unpoller/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the add-on for the target arch from unpoller/ and pushes
      # ghcr.io/craqs/ha-unpoller-<arch>:<version> (version from config.yaml)
      # plus :latest. Matches the `image:` field in unpoller/config.yaml.
      - name: Build ${{ matrix.arch }} add-on
        uses: home-assistant/builder@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
        with:
          args: |
            --${{ matrix.arch }} \
            --target unpoller \
            --image "ha-unpoller-{arch}" \
            --docker-hub "ghcr.io/craqs" \
            --addon

      # Read the just-built version so the scan targets the exact tag.
      - name: Resolve add-on version
        id: ver
        run: echo "version=$(grep -E '^version:' unpoller/config.yaml | head -1 | sed -E 's/version:\s*"([^"]+)"/\1/')" >> "$GITHUB_OUTPUT"

      # Image scanning: pinned Trivy CLI run as a pinned container.
      #
      # Report-only (exit-code 0). This is a thin wrapper that ships the upstream
      # unpoller binary (copied from the digest-pinned ghcr.io/unpoller/unpoller
      # image) on an HA base image — neither of which we build. Most HIGH/CRITICAL
      # findings are Go-stdlib CVEs in the upstream binary, which we cannot patch
      # here; our remediation path is Renovate bumping the pinned upstream digest
      # (and the HA base tag). A hard --exit-code 1 would therefore block every
      # build on upstream's release cadence. We keep the scan for VISIBILITY (the
      # table lands in the CI log) and let the digest pin + Renovate be the actual
      # control. Revisit if/when we want to enforce a .trivyignore-scoped gate.
      - name: Trivy scan built image (report-only)
        run: |
          docker run --rm \
            -e TRIVY_USERNAME="${{ github.repository_owner }}" \
            -e TRIVY_PASSWORD="${{ secrets.GITHUB_TOKEN }}" \
            ghcr.io/aquasecurity/trivy@sha256:a22415a38938a56c379387a8163fcb0ce38b10ace73e593475d3658d578b2436 \
            image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 \
            "ghcr.io/craqs/ha-unpoller-${{ matrix.arch }}:${{ steps.ver.outputs.version }}"
